<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPTI金融性格测评</title>
    <link rel="stylesheet" href="style.css">
    <!-- 引入图表库 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <!-- 首页 -->
    <div id="home" class="page">
        <div class="top-nav">
            <button class="back-btn">×</button>
            <div class="nav-title">FPTI</div>
            <button class="menu-btn">☰</button>
        </div>
        <div class="banner">
            <h1 class="main-title">FPTI</h1>
            <p class="sub-title">金融性格测评 | 测出你的投资灵魂</p>
            <p class="desc">全球专业金融人格测试，揭秘你最像哪位投资大师</p>
        </div>
        <div class="version-cards">
            <div class="card active">
                <h3>标准版测评</h3>
                <p>12道专业题 | 精准匹配投资人格</p>
                <span class="hot">超10万人已测</span>
                <div class="check">✓</div>
            </div>
        </div>
        <p class="guide-text">点击开始，解锁你的投资人格</p>
        <button onclick="startQuiz()" class="start-btn">开始测试 →</button>
        <a href="javascript:showHistoryReport()" class="history-link">查看历史报告</a>
        <div class="notice" onclick="toggleNotice()">
            <h4>测试须知</h4>
            <span id="notice-arrow">↓</span>
        </div>
    </div>

    <!-- 测试页 -->
    <div id="quiz" class="page" style="display:none;">
        <div class="quiz-progress">
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
            <span id="progress-text">0/12</span>
        </div>
        <h2 id="question"></h2>
        <div id="options"></div>
        <button id="prev-btn" class="prev-btn" onclick="prevQuestion()" disabled>← 上一题</button>
    </div>

    <!-- 结果页 + 新增维度雷达图 -->
    <div id="result" class="page" style="display:none;">
        <h2>你的金融人格</h2>
        <h1 id="res-name"></h1>
        <p id="res-tag" class="result-tag"></p>
        <h3 id="res-title"></h3>
        <img id="res-img" src="" alt="人格头像" class="result-img">
        
        <!-- 👇 新增：投资人格维度雷达图 -->
        <div class="chart-box">
            <canvas id="personalityChart"></canvas>
        </div>

        <p id="res-desc" class="result-desc"></p>

        <button class="social-btn" onclick="showMatch()">🔍 查看我的投资搭档 & 死对头</button>
        <div id="match-text" class="match-text"></div>

        <div class="qrcode-box">
            <p>扫码测一测你的投资人格</p>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=https://page.fpti.cn" alt="二维码">
        </div>

        <button onclick="location.reload()" class="restart-btn">重新测试</button>
    </div>

    <!-- 历史弹窗 -->
    <div id="history-report-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>历史测评报告</h3>
                <button onclick="closeHistoryReport()" class="close-btn">×</button>
            </div>
            <div class="modal-body" id="history-list"></div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // 本地存储
        function saveResultToLocal(res) {
            let history = JSON.parse(localStorage.getItem('fpti_history') || '[]');
            history.unshift({ time: new Date().toLocaleString(), ...res });
            if (history.length > 10) history = history.slice(0,10);
            localStorage.setItem('fpti_history', JSON.stringify(history));
        }
        function showHistoryReport(){
            const modal=document.getElementById('history-report-modal');
            const list=document.getElementById('history-list');
            const history=JSON.parse(localStorage.getItem('fpti_history')||'[]');
            list.innerHTML=history.length===0?'<p class="empty-tip">暂无历史记录</p>':history.map(item=>`
                <div class="report-item"><p>${item.time}</p><h4>${item.name} | ${item.title}</h4></div>
            `).join('');
            modal.style.display='flex';
        }
        function closeHistoryReport(){document.getElementById('history-report-modal').style.display='none';}
        function toggleNotice(){alert('本测试仅供娱乐，不构成投资建议！市场有风险，投资需谨慎。');}
    </script>
</body>
</html>
