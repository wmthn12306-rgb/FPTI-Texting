<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <!-- 新增移动端适配 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPTI 金融性格测评</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 起始页（全新结构，对齐参考图） -->
    <div id="home" class="page">
        <!-- 1. 顶部导航栏 -->
        <div class="top-nav">
            <button class="back-btn">×</button>
            <div class="nav-title">FPTI 金融性格测评</div>
            <button class="menu-btn">☰</button>
        </div>

        <!-- 2. 主视觉横幅区 -->
        <div class="banner">
            <h1 class="main-title">FPTI</h1>
            <p class="sub-title">金融性格测评：测出你的投资灵魂</p>
            <p class="desc">全球首个专业金融人格测试，揭秘你的投资底层逻辑</p>
        </div>

        <!-- 3. 版本选择卡片 -->
        <div class="version-cards">
            <div class="card active">
                <h3>金融标准版</h3>
                <p>12道专业题 | 精准匹配投资大师</p>
                <span class="hot">近30天 9999+ 人测试</span>
                <div class="check">✓</div>
            </div>
        </div>

        <!-- 4. 行动引导语 -->
        <p class="guide-text">你是哪种金融人格？立即测试解锁答案</p>

        <!-- 5. 核心开始按钮（保留原有逻辑） -->
        <button onclick="startQuiz()" class="start-btn">开始测试 →</button>

        <!-- 6. 辅助功能链接 -->
        <a href="#" class="history-link">查看历史报告 ></a>

        <!-- 7. 测试须知区 -->
        <div class="notice">
            <h4>测试须知</h4>
            <span>↓</span>
        </div>
    </div>

    <!-- 测试页（原代码无修改） -->
    <div id="quiz" class="page" style="display:none;">
        <h2 id="question"></h2>
        <div id="options"></div>
    </div>

    <!-- 结果页（原代码无修改） -->
    <div id="result" class="page" style="display:none;">
        <h2>你的人格类型是：</h2>
        <img id="res-img" src="" alt="人格头像" style="width: 100%; border-radius: 20px; margin: 20px 0;">
        <h1 id="res-name"></h1>
        <h3 id="res-title"></h3>
        <p id="res-desc"></p>
        <button onclick="location.reload()">再测一次</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
